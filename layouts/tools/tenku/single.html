{{ define "main" }}
<div class="tenku-tool">

  <div class="tenku-header">
    <h1 class="tenku-title">{{ .Title }}</h1>
    <p class="tenku-desc">{{ .Description }}</p>
  </div>

  <div class="tenku-controls">

    <!-- 1行目：階層入力 ＋ デバフ -->
    <div class="control-row">
      <div class="control-group">
        <span class="control-label">階層（n）</span>
        <div class="floor-input-wrap">
          <input type="number" id="tenku-floor" min="1" max="999999" value="1">
          <span class="floor-unit">階</span>
          <span class="floor-lv">→ Lv <span id="tenku-lv-display">10,100</span></span>
        </div>
      </div>

      <div class="control-group">
        <span class="control-label">デバフ</span>
        <div class="toggle-group">
          <label class="toggle-label">
            <input type="checkbox" id="debuff-dark">
            <span class="toggle-btn">闇魔法（LUK半減）</span>
          </label>
        </div>
      </div>
    </div>

    <!-- 2行目：表示グループ選択 -->
    <div class="control-group full-width">
      <span class="control-label">表示</span>
      <div class="col-select-group" id="group-select-group">
        <label class="col-btn active" data-group="status"><input type="radio" name="view-group" value="status" checked>ステータス</label>
        <label class="col-btn" data-group="req_def"><input type="radio" name="view-group" value="req_def">無効DEF</label>
        <label class="col-btn" data-group="req_mdef"><input type="radio" name="view-group" value="req_mdef">無効MDEF</label>
        <label class="col-btn" data-group="evade_luk"><input type="radio" name="view-group" value="evade_luk">回避LUK</label>
        <label class="col-btn" data-group="hit_min_luk"><input type="radio" name="view-group" value="hit_min_luk">最低命中LUK</label>
        <label class="col-btn" data-group="hit_stable_luk"><input type="radio" name="view-group" value="hit_stable_luk">安定命中LUK</label>
      </div>
    </div>

    <!-- 3行目：ステータスのソート選択（ステータス選択時のみ表示） -->
    <div class="control-group full-width" id="status-sort-row" style="display:none;">
      <span class="control-label">ソート</span>
      <div class="col-select-group" id="status-sort-group">
        <label class="col-btn active" data-sort="vit"><input type="radio" name="sort-col" value="vit" checked>VIT</label>
        <label class="col-btn" data-sort="spd"><input type="radio" name="sort-col" value="spd">SPD</label>
        <label class="col-btn" data-sort="atk"><input type="radio" name="sort-col" value="atk">ATK</label>
        <label class="col-btn" data-sort="int"><input type="radio" name="sort-col" value="int">INT</label>
        <label class="col-btn" data-sort="def"><input type="radio" name="sort-col" value="def">DEF</label>
        <label class="col-btn" data-sort="mdef"><input type="radio" name="sort-col" value="mdef">MDEF</label>
        <label class="col-btn" data-sort="luk"><input type="radio" name="sort-col" value="luk">LUK</label>
      </div>
    </div>

    <!-- 4行目：無効MDEF遠距離トグル（無効MDEF選択時のみ表示） -->
    <div class="control-group full-width" id="mdef-range-row" style="display:none;">
      <span class="control-label">絞り込み</span>
      <div class="toggle-group">
        <label class="toggle-label">
          <input type="checkbox" id="include-ranged">
          <span class="toggle-btn">遠距離型を含める</span>
        </label>
      </div>
    </div>

  </div>

  <!-- 結果 -->
  <div class="tenku-result">
    <div class="result-meta" id="result-meta"></div>
    <div class="table-wrap">
      <table class="tenku-table" id="tenku-table">
        <thead><tr id="tenku-thead-row"></tr></thead>
        <tbody id="tenku-tbody"></tbody>
      </table>
    </div>
    <div class="no-result" id="tenku-no-result" style="display:none;">該当するモンスターが見つかりません</div>
  </div>

</div>

<script src="{{ "monsters-data.js" | relURL }}"></script>
<script src="{{ "js/tenku.js" | relURL }}"></script>
{{ end }}
