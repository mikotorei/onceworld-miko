{{ define "main" }}

<h1>{{ .Title }}</h1>
<script src="{{ "monsters-data.js" | relURL }}"></script>

<section>
  <h2>主人公ステータス</h2>

  <div class="hero-top-block">
    <div class="hero-top-row">
      <span class="hero-top-label">属性:</span>
      <div class="chip-group" id="hero-element-group" aria-label="hero element">
        <button type="button" class="chip-btn" data-hero-element="fire" aria-pressed="true">火</button>
        <button type="button" class="chip-btn" data-hero-element="water" aria-pressed="false">水</button>
        <button type="button" class="chip-btn" data-hero-element="wood" aria-pressed="false">木</button>
        <button type="button" class="chip-btn" data-hero-element="light" aria-pressed="false">光</button>
        <button type="button" class="chip-btn" data-hero-element="dark" aria-pressed="false">闇</button>
      </div>
    </div>

    <div class="hero-top-row">
      <span class="hero-top-label">攻撃:</span>
      <div class="chip-group" id="attack-type-group" aria-label="attack type">
        <button type="button" class="chip-btn" data-attack-type="physical" aria-pressed="true">物理</button>
        <button type="button" class="chip-btn" data-attack-type="magic" aria-pressed="false">魔法</button>
      </div>
    </div>
  </div>

  <div class="hero-grid">
    <div class="hero-row">
      <span class="hero-label">atk:</span>
      <input id="hero-atk" type="number" inputmode="numeric" min="0" step="1" value="0">
    </div>
    <div class="hero-row">
      <span class="hero-label">int:</span>
      <input id="hero-int" type="number" inputmode="numeric" min="0" step="1" value="0">
    </div>
    <div class="hero-row">
      <span class="hero-label">spd:</span>
      <input id="hero-spd" type="number" inputmode="numeric" min="0" step="1" value="0">
    </div>

    <div class="hero-row magic-only" id="analysis-book-row" hidden>
      <span class="hero-label">解析書:</span>
      <input id="analysis-book" type="number" inputmode="numeric" min="0" step="1" value="0">
    </div>
    <div class="hero-row magic-only" id="analysis-book-advanced-row" hidden>
      <span class="hero-label">解析書の解析書:</span>
      <input id="analysis-book-advanced" type="number" inputmode="numeric" min="0" step="1" value="0">
    </div>
  </div>

  <div class="mode-panels">
    <div class="mode-panel" id="physical-panel">
      <div class="mode-row">
        <span class="mode-label">物理補助:</span>
        <div class="chip-group" aria-label="physical debuffs">
          <button id="debuff-wood" type="button" class="chip-btn" aria-pressed="false">木魔法(def半減)</button>
          <button id="debuff-dark" type="button" class="chip-btn" aria-pressed="false">闇魔法(luk半減)</button>
        </div>
      </div>
    </div>

    <div class="mode-panel" id="magic-panel" hidden>
      <div class="mode-row">
        <span class="mode-label">使用魔法:</span>
        <div class="chip-group" id="spell-group" aria-label="spell select">
          <button type="button" class="chip-btn" data-spell="fire" aria-pressed="true">火魔法</button>
          <button type="button" class="chip-btn" data-spell="water" aria-pressed="false">水魔法</button>
          <button type="button" class="chip-btn" data-spell="wood" aria-pressed="false">木魔法</button>
          <button type="button" class="chip-btn" data-spell="light" aria-pressed="false">光魔法</button>
          <button type="button" class="chip-btn" data-spell="dark" aria-pressed="false">闇魔法</button>
        </div>
      </div>

      <div class="mode-row">
        <span class="mode-label">魔法補助:</span>
        <div class="chip-group" aria-label="magic debuffs">
          <button id="debuff-wood-magic" type="button" class="chip-btn" aria-pressed="false">木魔法(def半減)</button>
        </div>
      </div>
    </div>
  </div>
</section>

<section class="enemy-section">
  <h2>モンスター</h2>
  <div class="enemy-picker">
    <div class="enemy-row">
      <span class="enemy-label">name:</span>
      <div class="enemy-input-wrap">
        <input id="monster-search" type="text" placeholder="名前で検索して選択" autocomplete="off">
        <div id="monster-suggest" class="suggest" hidden></div>
      </div>
    </div>

    <div class="enemy-selected" id="monster-selected" hidden>
      選択中: <strong id="monster-selected-name"></strong>
    </div>

    <div class="enemy-row mt" aria-label="level shortcuts">
      <span class="enemy-label">Lv:</span>
      <div class="lv-shortcuts" id="lv-shortcuts"></div>
    </div>

    <div class="enemy-row mt">
      <span class="enemy-label">Lv:</span>
      <input id="enemy-lv" class="lv-input" type="number" inputmode="numeric" min="1" step="1" value="1" disabled>
    </div>
  </div>
</section>

<section class="action-section">
  <div class="action-row">
    <button id="calc-btn" type="button" disabled>計算</button>
    <button id="critical-toggle" type="button" class="side-toggle" aria-pressed="false">クリティカルOFF</button>
  </div>
</section>

<section class="result-section">
  <h2>結果</h2>

  <div class="result-block">
    <div class="result-title">物理</div>
    <div class="result-row">
      <div class="result-label">与ダメ範囲</div>
      <div class="result-value">
        <span id="out-phy-dmg">-</span>
        <span class="muted">（多段: <span id="out-hits">-</span>）</span>
      </div>
    </div>
    <div class="result-row">
      <div class="result-label">ワンパンライン</div>
      <div class="result-value" id="out-phy-one">-</div>
    </div>
  </div>

  <div class="result-block">
    <div class="result-title">魔法</div>
    <div class="result-row">
      <div class="result-label">与ダメ範囲</div>
      <div class="result-value" id="out-mag-dmg">-</div>
    </div>
    <div class="result-row">
      <div class="result-label">ワンパンライン</div>
      <div class="result-value" id="out-mag-one">-</div>
    </div>
  </div>

  <div class="result-block">
    <div class="result-title">命中 / 回避</div>
    <div class="result-row">
      <div class="result-label">命中luk</div>
      <div class="result-value" id="out-hit-luk">-</div>
    </div>
    <div class="result-row">
      <div class="result-label">回避luk</div>
      <div class="result-value" id="out-evade-luk">-</div>
    </div>
  </div>

  <div class="result-block">
    <div class="result-title">
      無効化 <span class="muted">（防御=def+0.1mdef / 魔法防御=mdef+0.1def）</span>
    </div>
    <div class="result-row">
      <div class="result-label">必要防御</div>
      <div class="result-value" id="out-null-def">-</div>
    </div>
    <div class="result-row">
      <div class="result-label">必要魔法防御</div>
      <div class="result-value" id="out-null-mdef">-</div>
    </div>
  </div>
</section>

<div id="calc-app"></div>

<script>
  // ========== 共通：整数・0以上（主人公） ==========
  (function () {
    const ids = ["hero-atk","hero-int","hero-spd","analysis-book","analysis-book-advanced"];
    function normalizeNonNegInt(el){
      const raw = (el.value ?? "").toString().trim();
      if (raw === "") { el.value = "0"; return; }
      const n = Math.floor(Number(raw));
      if (!Number.isFinite(n) || n < 0) { el.value = "0"; return; }
      el.value = String(n);
    }
    ids.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      normalizeNonNegInt(el);
      el.addEventListener("blur", () => normalizeNonNegInt(el));
    });
  })();

  // ========== 敵Lv：1以上整数 ==========
  function normalizeLv(el){
    const raw = (el.value ?? "").toString().trim();
    if (raw === "") { el.value = "1"; return 1; }
    const n = Math.floor(Number(raw));
    if (!Number.isFinite(n) || n < 1) { el.value = "1"; return 1; }
    el.value = String(n);
    return n;
  }

  // ========== 表示：カンマ ==========
  function fmt(n){
    const v = Math.floor(Number(n));
    if (!Number.isFinite(v)) return "0";
    return v.toLocaleString("ja-JP");
  }

  // ========== 多段（主人公SPD） ==========
  function hitsFromSpd(spd){
    const s = Math.floor(Number(spd));
    if (!Number.isFinite(s)) return 1;
    if (s <= 3000) return 1;
    if (s <= 9999) return 2;
    if (s <= 29999) return 3;
    if (s <= 99999) return 4;
    return 5;
  }

  // ========== レベルスケール（切り捨て） ==========
  function scaleStat(base, lv){
    return Math.floor(Number(base) * (1 + lv * 0.1));
  }

  // ========== 敵ステ（デバフ反映） ==========
  function buildEnemyScaled(monster, lv, state){
    const wood = !!state.debuffWood;
    const dark = !!state.debuffDark;

    const defScaled = scaleStat(monster.def, lv);
    const lukScaled = scaleStat(monster.luk, lv);

    return {
      id: monster.id,
      title: monster.title,
      lv,
      vit: scaleStat(monster.vit, lv),
      spd: scaleStat(monster.spd, lv),
      atk: scaleStat(monster.atk, lv),
      int: scaleStat(monster.int, lv),
      def: wood ? Math.floor(defScaled / 2) : defScaled,
      mdef: scaleStat(monster.mdef, lv),
      luk: dark ? Math.floor(lukScaled / 2) : lukScaled,
      element: monster.element ?? "",
      level_shortcuts: Array.isArray(monster.level_shortcuts) ? monster.level_shortcuts : []
    };
  }

  // ========== ダメージ ==========
  function damageRangeTotal(attack, defense, hits){
    const base = (attack * 7) - (defense * 4);
    if (base <= 0) return { min: 0, max: 0, base };
    const min = Math.floor(base * 0.9 * hits);
    const max = Math.floor(base * 1.1 * hits);
    return { min: Math.max(0, min), max: Math.max(0, max), base };
  }
  function formatMinMax(min, max){
    return `${fmt(min)}～${fmt(max)}`;
  }

  // 確定ワンパンライン（最小乱数でHP以上）
  function oneShotLineRequiredAttack(defense, hits, hp){
    const need = hp / (0.9 * hits);
    const x = (defense * 4 + need) / 7;
    return Math.max(0, Math.ceil(x));
  }

  // 必要防御（主人公ステ不要）
  function requiredDefenseForNullify(enemyAttack){
    const a = Math.floor(Number(enemyAttack));
    if (!Number.isFinite(a)) return 0;
    const x = (a * 7 - 10) / 4;
    return Math.max(0, Math.floor(x) + 1);
  }

  // ========== 検索・保存・計算 ==========
  (function () {
    const LS_KEY = "calc_state_v2";

    // outputs
    const outPhyDmg = document.getElementById("out-phy-dmg");
    const outHits = document.getElementById("out-hits");
    const outPhyOne = document.getElementById("out-phy-one");
    const outMagDmg = document.getElementById("out-mag-dmg");
    const outMagOne = document.getElementById("out-mag-one");
    const outHitLuk = document.getElementById("out-hit-luk");
    const outEvadeLuk = document.getElementById("out-evade-luk");
    const outNullDef = document.getElementById("out-null-def");
    const outNullMdef = document.getElementById("out-null-mdef");

    const calcBtn = document.getElementById("calc-btn");
    const criticalToggle = document.getElementById("critical-toggle");

    const search = document.getElementById("monster-search");
    const suggest = document.getElementById("monster-suggest");
    const selectedBox = document.getElementById("monster-selected");
    const selectedName = document.getElementById("monster-selected-name");

    const lvInput = document.getElementById("enemy-lv");
    const shortcutWrap = document.getElementById("lv-shortcuts");

    const physicalPanel = document.getElementById("physical-panel");
    const magicPanel = document.getElementById("magic-panel");
    const analysisBookRow = document.getElementById("analysis-book-row");
    const analysisBookAdvancedRow = document.getElementById("analysis-book-advanced-row");

    const attackTypeButtons = Array.from(document.querySelectorAll("[data-attack-type]"));
    const heroElementButtons = Array.from(document.querySelectorAll("[data-hero-element]"));
    const spellButtons = Array.from(document.querySelectorAll("[data-spell]"));

    const debuffWoodBtn = document.getElementById("debuff-wood");
    const debuffDarkBtn = document.getElementById("debuff-dark");
    const debuffWoodMagicBtn = document.getElementById("debuff-wood-magic");

    let picked = null;
    let currentLv = 1;
    let enemyScaled = null;

    const state = {
      heroElement: "fire",
      attackType: "physical",
      spell: "fire",
      debuffWood: false,
      debuffDark: false,
      critical: false
    };

    function setCalcEnabled(){ calcBtn.disabled = !picked; }

    function setPressed(buttons, selectedValue, attrName){
      buttons.forEach(btn => {
        const value = btn.getAttribute(attrName);
        btn.setAttribute("aria-pressed", value === selectedValue ? "true" : "false");
      });
    }

    function setDebuffButtons(){
      debuffWoodBtn.setAttribute("aria-pressed", state.debuffWood && state.attackType === "physical" ? "true" : "false");
      debuffDarkBtn.setAttribute("aria-pressed", state.debuffDark && state.attackType === "physical" ? "true" : "false");
      debuffWoodMagicBtn.setAttribute("aria-pressed", state.debuffWood && state.attackType === "magic" ? "true" : "false");
      criticalToggle.setAttribute("aria-pressed", state.critical ? "true" : "false");
      criticalToggle.textContent = state.critical ? "クリティカルON" : "クリティカルOFF";
    }

    function applyModeUI(){
      const isMagic = state.attackType === "magic";

      physicalPanel.hidden = isMagic;
      magicPanel.hidden = !isMagic;

      analysisBookRow.hidden = !isMagic;
      analysisBookAdvancedRow.hidden = !isMagic;

      setPressed(attackTypeButtons, state.attackType, "data-attack-type");
      setPressed(heroElementButtons, state.heroElement, "data-hero-element");
      setPressed(spellButtons, state.spell, "data-spell");
      setDebuffButtons();

      if (!isMagic) {
        state.spell = state.spell || "fire";
      }

      if (picked) {
        enemyScaled = buildEnemyScaled(picked, currentLv, state);
      }
      saveState();
    }

    function saveState(){
      try{
        const hero = {
          atk: document.getElementById("hero-atk").value,
          int: document.getElementById("hero-int").value,
          spd: document.getElementById("hero-spd").value,
          analysisBook: document.getElementById("analysis-book").value,
          analysisBookAdvanced: document.getElementById("analysis-book-advanced").value
        };
        const st = {
          monster_id: picked ? picked.id : "",
          lv: currentLv,
          hero,
          state
        };
        localStorage.setItem(LS_KEY, JSON.stringify(st));
      }catch(e){}
    }

    function loadState(){
      try{
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return;
        const st = JSON.parse(raw);

        if (st?.hero){
          const map = {
            "hero-atk":"atk",
            "hero-int":"int",
            "hero-spd":"spd",
            "analysis-book":"analysisBook",
            "analysis-book-advanced":"analysisBookAdvanced"
          };
          Object.keys(map).forEach(id=>{
            const el = document.getElementById(id);
            if (!el) return;
            const v = st.hero[map[id]];
            if (v !== undefined && v !== null) el.value = String(v);
          });
        }

        if (Number.isFinite(Number(st?.lv))) currentLv = Math.max(1, Math.floor(Number(st.lv)));

        if (st?.state){
          if (["fire","water","wood","light","dark"].includes(st.state.heroElement)) {
            state.heroElement = st.state.heroElement;
          }
          if (["physical","magic"].includes(st.state.attackType)) {
            state.attackType = st.state.attackType;
          }
          if (["fire","water","wood","light","dark"].includes(st.state.spell)) {
            state.spell = st.state.spell;
          }
          state.debuffWood = !!st.state.debuffWood;
          state.debuffDark = !!st.state.debuffDark;
          state.critical = !!st.state.critical;
        }
      }catch(e){}
    }

    function closeSuggest(){
      suggest.hidden = true;
      suggest.innerHTML = "";
    }

    function renderShortcuts(shortcuts){
      shortcutWrap.innerHTML = "";
      const arr = Array.isArray(shortcuts) ? shortcuts : [];
      if (!picked) return;
      if (arr.length === 0) return;

      arr.forEach(v => {
        const lv = Math.floor(Number(v));
        if (!Number.isFinite(lv) || lv < 1) return;
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = String(lv);
        btn.addEventListener("click", () => {
          currentLv = lv;
          lvInput.value = String(lv);
          enemyScaled = buildEnemyScaled(picked, currentLv, state);
          saveState();
        });
        shortcutWrap.appendChild(btn);
      });
    }

    function applyPickedUI(){
      if (!picked){
        selectedBox.hidden = true;
        selectedName.textContent = "";
        lvInput.disabled = true;
        lvInput.value = String(currentLv);
        shortcutWrap.innerHTML = "";
        enemyScaled = null;
        setCalcEnabled();
        return;
      }

      selectedName.textContent = picked.title;
      selectedBox.hidden = false;

      lvInput.disabled = false;
      lvInput.value = String(currentLv);

      renderShortcuts(picked.level_shortcuts);

      enemyScaled = buildEnemyScaled(picked, currentLv, state);
      saveState();
      setCalcEnabled();
    }

    function openSuggest(items){
      suggest.hidden = false;
      suggest.innerHTML = "";
      items.forEach(m => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.textContent = m.title;
        btn.addEventListener("click", () => {
          picked = m;
          search.value = m.title;
          applyPickedUI();
          closeSuggest();
        });
        suggest.appendChild(btn);
      });
    }

    function clearPicked(){
      picked = null;
      enemyScaled = null;
      selectedBox.hidden = true;
      selectedName.textContent = "";
      lvInput.disabled = true;
      lvInput.value = String(currentLv);
      shortcutWrap.innerHTML = "";
      saveState();
      setCalcEnabled();
    }

    function normalizeJP(s){
      const str = (s ?? "").toString().trim().toLowerCase();
      return str.replace(/[\u30A1-\u30F6]/g, ch => String.fromCharCode(ch.charCodeAt(0) - 0x60));
    }

    function filterMonsters(q){
      if (!Array.isArray(window.MONSTERS)) return [];
      const query = normalizeJP(q);
      if (query.length === 0) return [];
      return window.MONSTERS
        .filter(m => normalizeJP(m.title ?? "").includes(query))
        .slice(0, 50);
    }

    function getHeroInts(){
      const atk = Math.floor(Number(document.getElementById("hero-atk").value));
      const intl = Math.floor(Number(document.getElementById("hero-int").value));
      const spd = Math.floor(Number(document.getElementById("hero-spd").value));
      return {
        atk: Number.isFinite(atk) ? Math.max(0, atk) : 0,
        int: Number.isFinite(intl) ? Math.max(0, intl) : 0,
        spd: Number.isFinite(spd) ? Math.max(0, spd) : 0
      };
    }

    // 初期：保存状態復元
    loadState();
    lvInput.value = String(currentLv);
    applyModeUI();
    setCalcEnabled();

    ["hero-atk","hero-int","hero-spd","analysis-book","analysis-book-advanced"].forEach(id=>{
      const el = document.getElementById(id);
      if (!el) return;
      el.addEventListener("blur", saveState);
    });

    // 保存データにモンスターが居たら復元
    (function restorePicked(){
      try{
        const raw = localStorage.getItem(LS_KEY);
        if (!raw) return;
        const st = JSON.parse(raw);
        const mid = (st?.monster_id ?? "").toString();
        if (!mid || !Array.isArray(window.MONSTERS)) return;
        const found = window.MONSTERS.find(m => String(m.id) === mid);
        if (!found) return;
        picked = found;
        search.value = found.title;
        applyPickedUI();
      }catch(e){}
    })();

    // 主人公属性
    heroElementButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        state.heroElement = btn.getAttribute("data-hero-element") || "fire";
        applyModeUI();
      });
    });

    // 攻撃タイプ
    attackTypeButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        state.attackType = btn.getAttribute("data-attack-type") || "physical";
        if (state.attackType === "physical") {
          state.debuffDark = state.debuffDark;
        } else {
          state.debuffDark = false;
        }
        applyModeUI();
      });
    });

    // 使用魔法
    spellButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        state.spell = btn.getAttribute("data-spell") || "fire";
        applyModeUI();
      });
    });

    // 物理デバフ
    debuffWoodBtn.addEventListener("click", () => {
      if (state.attackType !== "physical") return;
      state.debuffWood = !state.debuffWood;
      enemyScaled = picked ? buildEnemyScaled(picked, currentLv, state) : null;
      setDebuffButtons();
      saveState();
    });

    debuffDarkBtn.addEventListener("click", () => {
      if (state.attackType !== "physical") return;
      state.debuffDark = !state.debuffDark;
      enemyScaled = picked ? buildEnemyScaled(picked, currentLv, state) : null;
      setDebuffButtons();
      saveState();
    });

    // 魔法デバフ
    debuffWoodMagicBtn.addEventListener("click", () => {
      if (state.attackType !== "magic") return;
      state.debuffWood = !state.debuffWood;
      enemyScaled = picked ? buildEnemyScaled(picked, currentLv, state) : null;
      setDebuffButtons();
      saveState();
    });

    // クリティカル
    criticalToggle.addEventListener("click", () => {
      state.critical = !state.critical;
      setDebuffButtons();
      saveState();
    });

    // 検索（空欄でリセット）
    search.addEventListener("input", () => {
      const q = search.value;

      if (q.trim() === "") {
        clearPicked();
        closeSuggest();
        return;
      }

      if (picked && q !== picked.title) {
        clearPicked();
      }

      const items = filterMonsters(q);
      if (items.length === 0) closeSuggest();
      else openSuggest(items);
    });

    search.addEventListener("focus", () => {
      const items = filterMonsters(search.value);
      if (items.length === 0) closeSuggest();
      else openSuggest(items);
    });

    document.addEventListener("click", (e) => {
      const t = e.target;
      if (t === search || suggest.contains(t)) return;
      closeSuggest();
    });

    lvInput.addEventListener("blur", () => {
      if (!picked) return;
      currentLv = normalizeLv(lvInput);
      enemyScaled = buildEnemyScaled(picked, currentLv, state);
      saveState();
    });

    // 計算ボタン
    calcBtn.addEventListener("click", () => {
      if (!picked || !enemyScaled) return;

      const hero = getHeroInts();

      const hits = hitsFromSpd(hero.spd);
      outHits.textContent = fmt(hits);

      const enemyPhysDef = enemyScaled.def + enemyScaled.mdef * 0.1;
      const enemyMagDef  = enemyScaled.mdef + enemyScaled.def * 0.1;

      const phy = damageRangeTotal(hero.atk, enemyPhysDef, hits);
      outPhyDmg.textContent = formatMinMax(phy.min, phy.max);

      const mag = damageRangeTotal(hero.int, enemyMagDef, 1);
      outMagDmg.textContent = formatMinMax(mag.min, mag.max);

      const enemyHp = enemyScaled.vit * 18 + 100;

      const reqAtk = oneShotLineRequiredAttack(enemyPhysDef, hits, enemyHp);
      outPhyOne.textContent = `atk${fmt(reqAtk)}以上`;

      const reqInt = oneShotLineRequiredAttack(enemyMagDef, 1, enemyHp);
      outMagOne.textContent = `int${fmt(reqInt)}以上`;

      outHitLuk.textContent = `${fmt(Math.floor(enemyScaled.luk / 2))}以上`;
      outEvadeLuk.textContent = `${fmt(Math.floor(enemyScaled.luk * 3))}以上`;

      outNullDef.textContent = `${fmt(requiredDefenseForNullify(enemyScaled.atk))}以上`;
      outNullMdef.textContent = `${fmt(requiredDefenseForNullify(enemyScaled.int))}以上`;
    });
  })();
</script>
