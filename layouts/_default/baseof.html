<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ if .Title }}{{ .Title }} | {{ end }}{{ site.Title }}</title>
  <!-- 共通CSS -->
  <link rel="stylesheet" href="{{ "css/style.css?v=2" | relURL }}" />
  <!-- ホーム専用CSS -->
  {{ if .IsHome }}
    <link rel="stylesheet" href="{{ "css/home.css?v=1" | relURL }}" />
  {{ end }}
  <!-- マップ詳細ページCSS -->
  {{ if and (eq .Section "map") (eq .Kind "page") }}
    <link rel="stylesheet" href="{{ "css/map.css?v=1" | relURL }}" />
  {{ end }}
  <!-- 天空回廊計算表CSS -->
  {{ if eq .Layout "tenku" }}
    <link rel="stylesheet" href="{{ "css/tenku.css?v=1" | relURL }}" />
  {{ end }}
  <!-- 攻略ガイドCSS -->
  {{ if eq .Layout "guide" }}
    <link rel="stylesheet" href="{{ "css/guide.css?v=1" | relURL }}" />
  {{ end }}
  <!-- Google Analytics -->
  {{ if not .Site.IsServer }}
  {{ with .Site.Config.Services.GoogleAnalytics.ID }}
  <script async src="https://www.googletagmanager.com/gtag/js?id={{ . }}"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', '{{ . }}');
  </script>
  {{ end }}
  {{ end }}
</head>
